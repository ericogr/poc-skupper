apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-a
  namespace: app
  labels:
    app: echo-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-a
  template:
    metadata:
      labels:
        app: echo-a
    spec:
      containers:
        - name: echo-a
          image: hashicorp/http-echo:1.0
          args:
            - "-text=hello from A"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo-a
  namespace: app
spec:
  selector:
    app: echo-a
  ports:
    - port: 8080
      targetPort: 8080
